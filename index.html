<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>το 6 παιδί</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #12121c;
  color: white;
}

.header {
  text-align: center;
  padding: 12px;
  background: #0d0d14;
  font-weight: bold;
}

.chat {
  height: 80vh;
  overflow-y: auto;
  padding: 10px;
}

.msg {
  padding: 10px;
  margin: 10px;
  border-radius: 10px;
  max-width: 80%;
}

.user { background: #10a37f; margin-left: auto; }
.bot { background: #2b2b3d; }

.input {
  display: flex;
  padding: 10px;
  background: #0d0d14;
}

input {
  flex: 1;
  padding: 10px;
}

button {
  margin-left: 8px;
  padding: 10px;
}
</style>
</head>

<body>

<div class="header">👶 το 6 παιδί (clean block chatbot)</div>

<div id="chat" class="chat"></div>

<div class="input">
  <input id="input" placeholder="ρώτα κάτι..." />
  <button onclick="send()">Send</button>
  <button onclick="clearChat()">Clear</button>
</div>

<script>

const chat = document.getElementById("chat");

// 🧠 MEMORY (light context only)
let memory = [];

// 💬 UI
function add(text, cls){
  const div = document.createElement("div");
  div.className = "msg " + cls;
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

// 🔲 BLOCKS (ONLY FOR SELECTION, NOT OUTPUT)
const BLOCKS = {

  school: [
    "το σχολείο είναι οκ αλλά το διάλειμμα είναι καλύτερο 🎈",
    "στο σχολείο μαθαίνω αλλά κουράζομαι λίγο 🪑"
  ],

  play: [
    "παίζω Roblox και μερικές φορές χάνω 🎮",
    "παίζω παιχνίδια και γελάω 😄"
  ],

  food: [
    "μου αρέσουν τα μπισκότα 🍪",
    "τρώω σνακ και είμαι χαρούμενος 😋"
  ],

  greeting: [
    "γεια είμαι το 6 παιδί 👶",
    "γεια σου! τι κάνεις;"
  ],

  unknown: [
    "δεν είμαι σίγουρος αλλά μάλλον είναι απλό 🤔",
    "δεν το καταλαβαίνω καλά 😅"
  ]
};

// 🎯 DETECT QUESTION TYPE (USES BLOCKS)
function getBlock(text){
  const t = text.toLowerCase();

  if(t.includes("school") || t.includes("σχολ")) return "school";
  if(t.includes("play") || t.includes("game") || t.includes("παίζ")) return "play";
  if(t.includes("cookie") || t.includes("food") || t.includes("μπισκ")) return "food";
  if(t.includes("hi") || t.includes("hello") || t.includes("γεια")) return "greeting";

  return "unknown";
}

// 🤖 AI (CLEAN + CONTROLLED)
function ai(text){

  const block = getBlock(text);
  const options = BLOCKS[block];

  const reply = options[Math.floor(Math.random() * options.length)];

  memory.push(text);
  if(memory.length > 5) memory.shift();

  return reply;
}

// 💬 SEND
function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();

  if(!text) return;

  add(text, "user");
  input.value = "";

  setTimeout(() => {
    add(ai(text), "bot");
  }, 200);
}

// 🧹 CLEAR
function clearChat(){
  chat.innerHTML = "";
  memory = [];
}

document.getElementById("input").addEventListener("keypress", e => {
  if(e.key === "Enter") send();
});

</script>

</body>
</html>
